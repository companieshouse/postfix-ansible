---
- name: Provision Ansible SSH key
  import_playbook: ansible-ssh-key.yml

- name: Setup Postfix
  hosts: aws_ec2
  remote_user: ec2-user
  become: true
  gather_facts: true
  roles:
    - role: vault
    - role: hostname
    - role: prerequisites
    - role: postfix_configure
    - role: companieshouse.security.security_scans
